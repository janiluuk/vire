# Optional TLS terminator (Caddy internal CA). Usage:
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml --profile tls up -d
#
# Then point Vire at https://HOST:8443 (no trailing slash) — trust Caddy's CA in the browser for lab only.

services:
  try-linux-caddy:
    profiles: ["tls"]
    image: caddy:2.8-alpine
    ports:
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - try-linux-proxy
