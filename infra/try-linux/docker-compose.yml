# Try-Linux reverse proxy — deploy on lab or DMZ.
# Edit nginx/default.conf to change upstream host:port (default 192.168.2.100).

services:
  try-linux-proxy:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
