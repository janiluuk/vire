# Sparkki stack (Compose service names / default DB still use `vire` where historical)
#
# Local stack: Postgres, Prisma migrate, Next.js (`web`).
#   docker compose up -d --build
#   Web: http://localhost:1337 (set APP_PORT in `.env` to change host port).
#
# Database only (host-run `npm run dev` against Docker Postgres):
#   docker compose up -d db
#
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-vire}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vire_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vire}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Applies prisma/migrations whenever the stack comes up (idempotent).
  migrate:
    image: node:20-bookworm-slim
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-vire}
    volumes:
      - ./prisma:/app/prisma:ro
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        set -e
        apt-get update -y && apt-get install -y openssl ca-certificates && rm -rf /var/lib/apt/lists/*
        npx --yes prisma@5.22.0 migrate deploy --schema=./prisma/schema.prisma

  web:
    build:
      context: .
      dockerfile: Dockerfile
      # So `next build` can reach Postgres on the host-mapped port during `docker compose build web`
      # (see docs/repository-layout.md § Known sharp edges — ROADMAP review backlog #6).
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        DATABASE_URL: ${DATABASE_URL_BUILD:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@host.docker.internal:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-vire}}
    ports:
      - "${APP_PORT:-1337}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-vire}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production-min-32-chars}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:1337}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:1337}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@vire.fi}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  vire_pgdata:
