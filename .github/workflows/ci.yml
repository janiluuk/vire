name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, test, build, e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: sparkki
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/sparkki
      NEXTAUTH_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
      NEXTAUTH_URL: http://127.0.0.1:1337
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:1337
      ADMIN_EMAIL: admin@sparkki.fi
      ADMIN_PASSWORD: testpassword123
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:1337

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CI pipeline
        run: ./scripts/ci-local.sh --skip-install --skip-db
