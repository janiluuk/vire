name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, test, build, e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vire
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/vire
      NEXTAUTH_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
      NEXTAUTH_URL: http://127.0.0.1:1337
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:1337
      ADMIN_EMAIL: admin@vire.fi
      ADMIN_PASSWORD: testpassword123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Prisma migrate
        run: npx prisma migrate deploy

      - name: Prisma seed
        run: npx prisma db seed

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Functional tests
        run: npm run test:functional

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:1337
