<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sparkki Checker</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1>Sparkki Checker</h1>
        <p class="lead">
          Paikallinen työkalu: sama <code>checkCompatibility</code>-logiikka kuin
          verkkopalvelussa (<code>lib/compatibility.ts</code>). Tuloste JSONina.
        </p>
      </header>

      <form id="check-form" class="panel">
        <label>
          Valmistaja
          <input id="make" type="text" autocomplete="off" placeholder="Lenovo" />
        </label>
        <label>
          Malli
          <input id="model" type="text" autocomplete="off" placeholder="ThinkPad T480" />
        </label>
        <label>
          RAM (GB, valinnainen)
          <input id="ram" type="number" min="0" step="1" placeholder="8" />
        </label>
        <label>
          Levy
          <select id="disk">
            <option value="">(ei valintaa)</option>
            <option value="unknown">Tuntematon</option>
            <option value="hdd">HDD</option>
            <option value="ssd">SSD</option>
          </select>
        </label>
        <label class="full">
          DB-verdict (JSON, valinnainen)
          <textarea
            id="db"
            rows="4"
            spellcheck="false"
            placeholder='{"compatible":true,"verdict":"Sopii SSD-päivitykseen"}'
          ></textarea>
        </label>
        <div class="actions">
          <button type="submit">Laske</button>
          <button type="button" id="copy">Kopioi JSON</button>
          <button type="button" id="fetch-specs" class="secondary" hidden>
            Hae speksit verkosta
          </button>
        </div>
      </form>

      <section class="panel">
        <h2>Tulos (JSON)</h2>
        <pre id="out" class="out" aria-live="polite"></pre>
      </section>
    </main>
  </body>
</html>
